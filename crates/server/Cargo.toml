[package]
name = "github-graph-server"
version = "0.1.0"
edition = "2024"

[dependencies]
github-graph-shared = { path = "../../shared" }
axum = "0.8"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tower-http = { version = "0.6", features = ["cors", "fs"] }
uuid = { version = "1", features = ["v4"] }
