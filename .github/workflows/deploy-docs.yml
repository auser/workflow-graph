name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM (skip wasm-opt — bundled version is outdated)
        run: wasm-pack build crates/web --target web --no-typescript --no-opt

      - name: Copy WASM to docs
        run: |
          mkdir -p docs/public/wasm
          cp crates/web/pkg/workflow_graph_web.js docs/public/wasm/
          cp crates/web/pkg/workflow_graph_web_bg.wasm docs/public/wasm/
          cp crates/web/pkg/workflow_graph_web_bg.wasm docs/public/wasm/github_graph_web_bg.wasm

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
