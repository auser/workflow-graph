name: Publish Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Publish Rust crates to crates.io ───────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      # Publish in dependency order (allow "already exists" so re-runs succeed)
      - name: Publish workflow-graph-shared
        run: cargo publish -p workflow-graph-shared --allow-dirty || echo "Already published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish workflow-graph-queue
        run: |
          sleep 30
          cargo publish -p workflow-graph-queue --allow-dirty || echo "Already published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish workflow-graph-server
        run: |
          sleep 30
          cargo publish -p workflow-graph-server --allow-dirty || echo "Already published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish workflow-graph-worker-sdk
        run: |
          sleep 30
          cargo publish -p workflow-graph-worker-sdk --allow-dirty || echo "Already published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish workflow-graph-scheduler
        run: |
          sleep 30
          cargo publish -p workflow-graph-scheduler --allow-dirty || echo "Already published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ─── Build WASM and publish npm packages ────────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install TypeScript
        run: npm install -g typescript

      - name: Build WASM (skip wasm-opt — bundled version is outdated)
        run: wasm-pack build crates/web --target web --no-typescript --release --no-opt

      - name: Build @auser/workflow-graph-web (copy WASM + compile TS)
        working-directory: packages/web
        run: npm run build

      - name: Build @auser/workflow-graph-client
        working-directory: packages/client
        run: npm run build

      - name: Install React type dependencies
        working-directory: packages/react
        run: npm install --no-save --legacy-peer-deps @types/react

      - name: Build @auser/workflow-graph-react
        working-directory: packages/react
        run: npx tsc

      - name: Publish @auser/workflow-graph-web
        working-directory: packages/web
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @auser/workflow-graph-client
        working-directory: packages/client
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @auser/workflow-graph-react
        working-directory: packages/react
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Note: workflow-graph-web is cdylib (WASM) and cannot be published to crates.io.
  # Consumers use the npm package or build from source.
